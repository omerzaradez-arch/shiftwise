version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: shiftwise
      POSTGRES_USER: shiftwise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shiftwise_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shiftwise"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://shiftwise:${POSTGRES_PASSWORD:-shiftwise_dev}@db:5432/shiftwise
      ASYNC_DATABASE_URL: postgresql+asyncpg://shiftwise:${POSTGRES_PASSWORD:-shiftwise_dev}@db:5432/shiftwise
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: "false"
    ports:
      - "8001:8001"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8001}
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
